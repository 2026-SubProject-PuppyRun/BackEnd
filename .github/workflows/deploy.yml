name: Deploy to EC2

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Create Firebase service account file
        run: |
          mkdir -p src/main/resources
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > src/main/resources/firebase-service-account.json

      - name: Build jar
        run: ./gradlew clean bootJar

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: docker build -t puppyrun-backend:latest .

      - name: Tag Docker image
        run: docker tag puppyrun-backend:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/puppyrun-backend:latest

      - name: Push Docker image
        run: docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/puppyrun-backend:latest

      - name: Deploy via SSM
        run: |
          DC_BASE64=$(base64 -w 0 docker-compose.deploy.yml)
          ENV_BASE64=$(echo -n "${{ secrets.ENV_FILE }}" | base64 -w 0)
          
          aws ssm send-command \
          --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
          --document-name "AWS-RunShellScript" \
          --region "${{ secrets.AWS_REGION }}" \
          --parameters commands='[
          "export AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}",
          "export AWS_REGION=${{ secrets.AWS_REGION }}",
          "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com",
          "cd /home/ubuntu",
          "echo '"$DC_BASE64"' | base64 -d > docker-compose.deploy.yml",
          "echo '"$ENV_BASE64"' | base64 -d > .env",
          "chmod 600 docker-compose.deploy.yml",
          "chmod 600 .env",
          "docker compose -f docker-compose.deploy.yml pull backend",
          "docker compose -f docker-compose.deploy.yml up -d backend"
          ]' \
          --region "${{ secrets.AWS_REGION }}"
