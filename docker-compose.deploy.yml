services:
  mysql:
    image: mysql:8.0
    container_name: puppyrun-mysql
    restart: "no"
    environment:
      MYSQL_DATABASE: mydatabase
      MYSQL_USER: myuser
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: verysecret
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/puppyrun-backend:latest
    container_name: puppyrun-backend
    restart: "no"
    depends_on:
      - mysql

    ports:
      - "8080:8080"

    environment:
      SPRING_PROFILES_ACTIVE: prod

    env_file:
      - .env

volumes:
  mysql_data:
